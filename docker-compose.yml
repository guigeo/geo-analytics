# Servicos:
#   pipeline -> ETL geoespacial (gera GeoParquet + PMTiles)
#   web      -> dev server do mapa (Vite, HMR) em http://localhost:5173
#   preview  -> build de producao servido por Caddy (IGUAL a VPS) em :8080
#
# Fluxo: desenvolve (web) -> valida (preview) -> manda (deploy/deploy.sh). Ver Makefile.
#
# Uso:
#   docker compose build                          # constroi a imagem do ETL
#   docker compose run --rm pipeline build        # gera tiles + basemap
#   docker compose up web                          # dev em :5173
#   docker compose --profile preview up preview   # preview de producao em :8080
services:
  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    volumes:
      - .:/repo
    working_dir: /repo/pipeline
    environment:
      # Sobrescreva para um build mais recente: https://maps.protomaps.com/builds/
      - PROTOMAPS_BUILD_URL=${PROTOMAPS_BUILD_URL:-}

  web:
    image: node:20-slim
    working_dir: /repo/web
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/repo
      - web_node_modules:/repo/web/node_modules

  # Preview de producao: serve web/dist + tiles com o MESMO Caddy/config da VPS.
  # Exige um build antes (web/dist). Espelha o layout /var/www/geo da VPS.
  preview:
    image: caddy:2-alpine
    profiles: ["preview"]
    ports:
      - "8080:80"
    volumes:
      - ./web/dist:/srv/app:ro
      - ./web/public/tiles:/srv/tiles:ro
      - ./deploy/Caddyfile.local:/etc/caddy/Caddyfile:ro

volumes:
  web_node_modules:
